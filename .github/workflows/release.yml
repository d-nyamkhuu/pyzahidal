name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Validate release tag
        run: python -m scripts.check_release "${GITHUB_REF_NAME}"

      - name: Capture release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: pytest -q

      - name: Build distributions
        run: python -m build

      - name: Validate built metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/project/pyzahidal/

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  smoke-test-testpypi:
    runs-on: ubuntu-latest
    needs:
      - build
      - publish-testpypi

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Wait for TestPyPI metadata to propagate
        run: sleep 90

      - name: Install from TestPyPI
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "pyzahidal==${{ needs.build.outputs.version }}"

      - name: Smoke-test installed package
        run: |
          python - <<'PY'
          import pyzahidal

          doc = pyzahidal.EmailDocument(sections=["Smoke test"])
          html = doc.render()
          assert "<html" in html and "Smoke test" in html
          print("Installed package smoke test passed.")
          PY

  publish-pypi:
    runs-on: ubuntu-latest
    needs:
      - build
      - smoke-test-testpypi
    environment:
      name: pypi
      url: https://pypi.org/project/pyzahidal/

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
